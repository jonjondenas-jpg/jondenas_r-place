<!DOCTYPE html>
<html>
<head>
    <title>Super Circle War</title>
    <style>
        body { margin: 0; background: #222; overflow: hidden; color: white; font-family: sans-serif; }
        canvas { background: #333; display: block; }
        .ui { position: absolute; top: 10px; left: 10px; pointer-events: none; }
    </style>
</head>
<body>
    <div class="ui">WASD - Движение, Клик - Стрельба</div>
    <canvas id="game"></canvas>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let players = {};
        let bullets = [];
        let myPos = { x: 100, y: 100 };
        const speed = 5;
        const keys = {};

        // Управление
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        // Стрельба
        window.addEventListener('mousedown', e => {
            const angle = Math.atan2(e.clientY - myPos.y, e.clientX - myPos.x);
            const bullet = {
                x: myPos.x,
                y: myPos.y,
                velX: Math.cos(angle) * 10,
                velY: Math.sin(angle) * 10,
                owner: socket.id
            };
            socket.emit('shoot', bullet);
        });

        socket.on('updatePlayers', data => players = data);
        socket.on('newBullet', b => bullets.push(b));

        function gameLoop() {
            // Движение моего игрока
            if (keys['KeyW']) myPos.y -= speed;
            if (keys['KeyS']) myPos.y += speed;
            if (keys['KeyA']) myPos.x -= speed;
            if (keys['KeyD']) myPos.x += speed;

            if (keys['KeyW'] || keys['KeyS'] || keys['KeyA'] || keys['KeyD']) {
                socket.emit('move', myPos);
            }

            // Отрисовка
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Пули
            bullets.forEach((b, index) => {
                b.x += b.velX;
                b.y += b.velY;
                ctx.fillStyle = 'yellow';
                ctx.beginPath();
                ctx.arc(b.x, b.y, 5, 0, Math.PI*2);
                ctx.fill();
                // Удаляем пули за экраном
                if (b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) {
                    bullets.splice(index, 1);
                }
            });

            // Игроки
            for (let id in players) {
                const p = players[id];
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.id === socket.id ? myPos.x : p.x, p.id === socket.id ? myPos.y : p.y, 20, 0, Math.PI*2);
                ctx.fill();
                
                // Никнейм
                ctx.fillStyle = 'white';
                ctx.fillText(p.id === socket.id ? "ВЫ" : "ВРАГ", (p.id === socket.id ? myPos.x : p.x) - 10, (p.id === socket.id ? myPos.y : p.y) - 30);
            }

            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
